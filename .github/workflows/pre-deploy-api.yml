name: API - Testing and Deployment

on:
  pull_request:
    branches: [ staging, main ]
    paths:
      - 'api/**'
      - 'bin/**'
      - '.github/workflows/test-and-deploy-reusable.yml'

permissions:
  id-token: write
  contents: read

jobs:
  test-and-deploy:
    uses: ./.github/workflows/test-and-deploy-reusable.yml
    with:
      application: 'api'
      deploy-path: '/var/www/api.witchcraft-and-wizardry.school'
      test-mode: ${{ github.base_ref == 'main' && 'full' || 'abbreviated' }}
      use-azure-keyvault: true
      # Replace with your Azure Key Vault and federated identity values.
      keyvault-name: magic-kv
      azure-client-id: b96a868a-23a8-4b5e-8f78-274dd57d6a9b
      azure-tenant-id: 9a2a3100-fefb-41f9-8640-d4f22f3868e1
      azure-subscription-id: 7eac63bd-20a8-4559-9411-8bb42f97bc6c
    secrets:
      WAVE_API_KEY: ${{ secrets.WAVE_API_KEY }}
      NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
