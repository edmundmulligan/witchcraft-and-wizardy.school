name: Test and Deploy (Reusable)

on:
  workflow_call:
    inputs:
      application:
        required: true
        type: string
        description: 'Application folder name (web, stats, sound, api)'
      deploy-path:
        required: true
        type: string
        description: 'Server deployment path'
      test-mode:
        required: false
        type: string
        default: 'full'
        description: 'Test mode: "abbreviated" (quick checks) or "full" (all tests including browser/accessibility)'
      ignores:
        required: false
        type: string
        default: ''
        description: 'Comma-separated list of test categories to ignore (validation, links, browser, axe, pa11y, lighthouse, wave, readability) - e.g. "validation,links"'
      server:
        required: false
        type: string
        default: 'prod.edmundmulligan.name'
        description: 'Server hostname'
      use-azure-keyvault:
        required: false
        type: boolean
        default: false
        description: 'Load deployment credentials from Azure Key Vault'
      keyvault-name:
        required: false
        type: string
        default: ''
        description: 'Azure Key Vault name used when use-azure-keyvault=true'
      azure-client-id:
        required: false
        type: string
        default: ''
        description: 'Azure application (client) ID for OIDC login when use-azure-keyvault=true'
      azure-tenant-id:
        required: false
        type: string
        default: ''
        description: 'Azure tenant ID for OIDC login when use-azure-keyvault=true'
      azure-subscription-id:
        required: false
        type: string
        default: ''
        description: 'Azure subscription ID for OIDC login when use-azure-keyvault=true'
    secrets:
      WAVE_API_KEY:
        required: false
      NGROK_AUTHTOKEN:
        required: false
      SERVER_USERNAME:
        required: false
      SERVER_SSH_KEY:
        required: false

env:
  testurl: 'http://localhost:8080'
  testport: '8080'

jobs:
  run-pre-deployment-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci

    - name: Install Playwright Chromium
      run: |
        npx playwright install chromium

    - name: Setup Chrome for browser-based tests
      uses: browser-actions/setup-chrome@v2

    - name: Check Chrome installation
      run: |
        chrome --version

    - name: Clear previous accessibility results
      run: |
        bin/clear-tests.sh ${{ inputs.application }}

    - name: Validate HTML, CSS and JavaScript
      continue-on-error: true
      run: |
        bin/validate-code.sh ${{ inputs.application }}

    - name: Audit colour usage
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        node bin/audit-colour-usage.js ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Check for file comments
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/check-file-comments.sh ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Check for broken links
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/check-links.sh ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Check reading levels
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/check-reading-age.sh ${{ inputs.application }} ${IGNORES:+-x $IGNORES}
  
    - name: Check site works in different browsers
      if: inputs.test-mode == 'full'
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/run-browser-tests.sh ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Run axe accessibility tests
      if: inputs.test-mode == 'full'
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/run-axe-tests.sh -q ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Run Pa11y accessibility tests
      if: inputs.test-mode == 'full'
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/run-pa11y-tests.sh -q ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Run Lighthouse accessibility tests
      if: inputs.test-mode == 'full'
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/run-lighthouse-tests.sh -q ${{ inputs.application }} ${IGNORES:+-x $IGNORES}

    - name: Run WAVE accessibility tests
      if: inputs.test-mode == 'full' && github.base_ref == 'main'
      continue-on-error: true
      run: |
        IGNORES="${{ inputs.ignores }}"
        bin/run-wave-tests.sh -q ${{ inputs.application }} ${IGNORES:+-x $IGNORES}
      env:
        WAVE_API_KEY: ${{ secrets.WAVE_API_KEY }}
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}

    - name: Summarise test results
      continue-on-error: false
      run: |
        bin/summarise-tests.sh ${{ inputs.application }}

    - name: Upload test reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ inputs.application }}-test-reports
        path: |
          ${{ inputs.application }}/diagnostics/test-results/axe-results.json
          ${{ inputs.application }}/diagnostics/test-results/broken-links-results.json
          ${{ inputs.application }}/diagnostics/test-results/browser-results.json
          ${{ inputs.application }}/diagnostics/test-results/colour-audit-report.json
          ${{ inputs.application }}/diagnostics/test-results/file-comments-check-results.json
          ${{ inputs.application }}/diagnostics/test-results/lighthouse-results.json
          ${{ inputs.application }}/diagnostics/test-results/pa11y-results.json
          ${{ inputs.application }}/diagnostics/test-results/readability-results.json
          ${{ inputs.application }}/diagnostics/test-results/validation-results.json
          ${{ inputs.application }}/diagnostics/test-results/wave-results.json
  deploy:
    needs: run-pre-deployment-test
    if: github.base_ref == 'main'
    uses: ./.github/workflows/push-code-reusable.yml
    with:
      application: ${{ inputs.application }}
      deploy-path: ${{ inputs.deploy-path }}
      server: ${{ inputs.server }}
      use-azure-keyvault: ${{ inputs.use-azure-keyvault }}
      keyvault-name: ${{ inputs.keyvault-name }}
      azure-client-id: ${{ inputs.azure-client-id }}
      azure-tenant-id: ${{ inputs.azure-tenant-id }}
      azure-subscription-id: ${{ inputs.azure-subscription-id }}
    secrets:
      SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
