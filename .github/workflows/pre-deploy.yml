name: Accessibility Testing and Deployment (Shared Infrastructure)

on:
    pull_request:
        branches: [ staging, main ]
        paths:
        - 'bin/**'
        - 'package.json'
        - 'package-lock.json'
        - 'eslint.config.js'
        - 'cspell.json'
        - '.prettierrc'
        - '.prettierignore'
        - '.github/workflows/pre-deploy.yml'
        - '.github/workflows/test-and-deploy-reusable.yml'

env:
  testurl: 'http://localhost:8080'
  testport: '8080'

jobs:
  run-pre-deployment-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci

    - name: Install Playwright Chromium
      run: |
        npx playwright install chromium

    - name: Clear previous accessibility results
      run: |
        bin/clear-tests.sh .

    - name: Validate HTML, CSS and JavaScript
      continue-on-error: true
      run: |
        bin/validate-code.sh .

    - name: Audit colour usage
      continue-on-error: true
      run: |
        node bin/audit-colour-usage.js -x lessons

    - name: Check for file comments
      continue-on-error: true
      run: |
        bin/check-file-comments.sh . -x lessons

    - name: Check for broken links
      continue-on-error: true
      run: |
        bin/check-links.sh . -x lessons

    - name: Setup Chrome for browser-based tests
      uses: browser-actions/setup-chrome@v1

    - name: Check Chrome installation
      run: |
        chrome --version

    - name: Run axe accessibility tests
      continue-on-error: true
      run: |
        bin/run-axe-tests.sh -q . -x lessons

    - name: Run Lighthouse accessibility tests
      continue-on-error: true
      run: |
        bin/run-lighthouse-tests.sh -q . -x lessons

    - name: Run Pa11y accessibility tests
      continue-on-error: true
      run: |
        bin/run-pa11y-tests.sh -q . -x lessons

    - name: Run WAVE accessibility tests
      if: github.base_ref == 'main'
      continue-on-error: true
      run: |
        bin/run-wave-tests.sh -q . -x lessons
      env:
        WAVE_API_KEY: ${{ secrets.WAVE_API_KEY }}
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}

    - name: Check reading levels
      continue-on-error: true
      run: |
        bin/check-reading-age.sh . -x lessons

    - name: Check site works in different browsers
      continue-on-error: true
      run: |
        bin/run-browser-tests.sh . -x lessons

    - name: Summarise test results
      continue-on-error: false
      run: |
        bin/summarise-tests.sh .

    - name: Upload test reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-reports
        path: |
          diagnostics/test-results/axe-results.json
          diagnostics/test-results/broken-links-results.json
          diagnostics/test-results/browser-results.json
          diagnostics/test-results/colour-audit-report.json
          diagnostics/test-results/file-comments-check-results.json
          diagnostics/test-results/lighthouse-results.json
          diagnostics/test-results/pa11y-results.json
          diagnostics/test-results/readability-results.json
          diagnostics/test-results/validation-results.json
          diagnostics/test-results/wave-results.json
