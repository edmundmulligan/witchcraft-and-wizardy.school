name: Push Code to Server (Reusable)

on:
  workflow_call:
    inputs:
      application:
        required: true
        type: string
        description: 'Application folder name (web, stats, sound, api)'
      deploy-path:
        required: true
        type: string
        description: 'Server deployment path'
      server:
        required: false
        type: string
        default: 'prod.edmundmulligan.name'
        description: 'Server hostname'
      use-azure-keyvault:
        required: false
        type: boolean
        default: false
        description: 'Load deployment credentials and API runtime secrets from Azure Key Vault'
      keyvault-name:
        required: false
        type: string
        default: ''
        description: 'Azure Key Vault name used when use-azure-keyvault=true'
      azure-client-id:
        required: false
        type: string
        default: ''
        description: 'Azure application (client) ID for OIDC login when use-azure-keyvault=true'
      azure-tenant-id:
        required: false
        type: string
        default: ''
        description: 'Azure tenant ID for OIDC login when use-azure-keyvault=true'
      azure-subscription-id:
        required: false
        type: string
        default: ''
        description: 'Azure subscription ID for OIDC login when use-azure-keyvault=true'
    secrets:
      SERVER_USERNAME:
        required: false
      SERVER_SSH_KEY:
        required: false
      SERVER_FINGERPRINT:
        required: false

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Azure login (OIDC)
      if: inputs.use-azure-keyvault
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Load deployment secrets from Azure Key Vault
      if: inputs.use-azure-keyvault
      id: keyvault
      shell: bash
      env:
        KEYVAULT_NAME: ${{ inputs.keyvault-name }}
      run: |
        set -euo pipefail

        if [[ -z "$KEYVAULT_NAME" ]]; then
          echo "keyvault-name is required when use-azure-keyvault=true" >&2
          exit 1
        fi

        get_required_secret() {
          local secret_name="$1"
          local value
          value="$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$secret_name" --query value -o tsv)"
          if [[ -z "$value" ]]; then
            echo "Required secret '$secret_name' is empty in Key Vault '$KEYVAULT_NAME'" >&2
            exit 1
          fi
          printf '%s' "$value"
        }

        get_optional_secret() {
          local secret_name="$1"
          az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$secret_name" --query value -o tsv 2>/dev/null || true
        }

        server_username="$(get_required_secret 'SERVER-USERNAME')"
        server_ssh_key="$(get_required_secret 'SERVER-SSH-KEY')"
        server_fingerprint="$(get_optional_secret 'SERVER-FINGERPRINT')"

        smtp_host="$(get_required_secret 'SMTP-HOST')"
        smtp_port="$(get_required_secret 'SMTP-PORT')"
        smtp_secure="$(get_required_secret 'SMTP-SECURE')"
        smtp_user="$(get_required_secret 'SMTP-USER')"
        smtp_pass="$(get_required_secret 'SMTP-PASS')"
        email_from="$(get_required_secret 'EMAIL-FROM')"

        for value in \
          "$server_username" "$server_ssh_key" "$server_fingerprint" \
          "$smtp_host" "$smtp_port" "$smtp_secure" "$smtp_user" "$smtp_pass" "$email_from"
        do
          if [[ -n "$value" ]]; then
            echo "::add-mask::$value"
          fi
        done

        {
          echo "server_username<<EOF"
          echo "$server_username"
          echo "EOF"
          echo "server_ssh_key<<EOF"
          echo "$server_ssh_key"
          echo "EOF"
          echo "server_fingerprint<<EOF"
          echo "$server_fingerprint"
          echo "EOF"
          echo "smtp_host<<EOF"
          echo "$smtp_host"
          echo "EOF"
          echo "smtp_port<<EOF"
          echo "$smtp_port"
          echo "EOF"
          echo "smtp_secure<<EOF"
          echo "$smtp_secure"
          echo "EOF"
          echo "smtp_user<<EOF"
          echo "$smtp_user"
          echo "EOF"
          echo "smtp_pass<<EOF"
          echo "$smtp_pass"
          echo "EOF"
          echo "email_from<<EOF"
          echo "$email_from"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Resolve deploy auth from Key Vault
      if: inputs.use-azure-keyvault
      id: deploy_auth_keyvault
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "ssh_username<<EOF"
          echo "${{ steps.keyvault.outputs.server_username }}"
          echo "EOF"
          echo "ssh_key<<EOF"
          echo "${{ steps.keyvault.outputs.server_ssh_key }}"
          echo "EOF"
          echo "ssh_fingerprint<<EOF"
          echo "${{ steps.keyvault.outputs.server_fingerprint }}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Resolve deploy auth from GitHub secrets
      if: ${{ !inputs.use-azure-keyvault }}
      id: deploy_auth_secrets
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "ssh_username<<EOF"
          echo "${{ secrets.SERVER_USERNAME }}"
          echo "EOF"
          echo "ssh_key<<EOF"
          echo "${{ secrets.SERVER_SSH_KEY }}"
          echo "EOF"
          echo "ssh_fingerprint<<EOF"
          echo "${{ secrets.SERVER_FINGERPRINT }}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Determine version bump type
      id: bump_type
      run: |
        echo "Event: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "value=patch" >> "$GITHUB_OUTPUT"

    - name: Bump semantic version
      id: version
      shell: bash
      run: |
        set -euo pipefail

        VERSION_FILE="${{ inputs.application }}/VERSION"

        if [ ! -f "$VERSION_FILE" ] || [ ! -s "$VERSION_FILE" ]; then
          echo "VERSION missing or empty; defaulting to 0.0.0"
          echo "0.0.0" > "$VERSION_FILE"
        fi

        new_version="$(bin/bump-version.sh "${{ steps.bump_type.outputs.value }}" "$VERSION_FILE")"
        echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
        echo "New version: ${new_version}"

    - name: Create release tarball
      id: package
      shell: bash
      run: |
        set -euo pipefail

        archive_path="$(bash bin/create-release-tar.sh "${{ steps.version.outputs.new_version }}" "${{ inputs.application }}" releases)"
        archive_name="$(basename "$archive_path")"

        # Count path components so SCP places the file directly under /tmp
        # e.g. stats/releases/archive.tar.gz has 2 leading components to strip
        strip_count="$(echo "$archive_path" | tr -cd '/' | wc -c)"

        echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"
        echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"
        echo "strip_count=$strip_count" >> "$GITHUB_OUTPUT"

    - name: Copy release tarball to server
      uses: appleboy/scp-action@v1.0.0
      with:
        host: ${{ inputs.server }}
        username: ${{ steps.deploy_auth_keyvault.outputs.ssh_username || steps.deploy_auth_secrets.outputs.ssh_username }}
        key: ${{ steps.deploy_auth_keyvault.outputs.ssh_key || steps.deploy_auth_secrets.outputs.ssh_key }}
        fingerprint: ${{ steps.deploy_auth_keyvault.outputs.ssh_fingerprint || steps.deploy_auth_secrets.outputs.ssh_fingerprint }}
        source: ${{ steps.package.outputs.archive_path }}
        target: /tmp
        strip_components: ${{ steps.package.outputs.strip_count }}

    - name: Extract release tarball on server
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ inputs.server }}
        username: ${{ steps.deploy_auth_keyvault.outputs.ssh_username || steps.deploy_auth_secrets.outputs.ssh_username }}
        key: ${{ steps.deploy_auth_keyvault.outputs.ssh_key || steps.deploy_auth_secrets.outputs.ssh_key }}
        fingerprint: ${{ steps.deploy_auth_keyvault.outputs.ssh_fingerprint || steps.deploy_auth_secrets.outputs.ssh_fingerprint }}
        script: |
          set -e
          mkdir -p "${{ inputs.deploy-path }}"
          tar -xzf "/tmp/${{ steps.package.outputs.archive_name }}" -C "${{ inputs.deploy-path }}" --strip-components=1
          rm -f "/tmp/${{ steps.package.outputs.archive_name }}"

    - name: Install API dependencies and restart API process
      if: inputs.application == 'api'
      uses: appleboy/ssh-action@v1.2.5
      env:
        SMTP_HOST: ${{ steps.keyvault.outputs.smtp_host }}
        SMTP_PORT: ${{ steps.keyvault.outputs.smtp_port }}
        SMTP_SECURE: ${{ steps.keyvault.outputs.smtp_secure }}
        SMTP_USER: ${{ steps.keyvault.outputs.smtp_user }}
        SMTP_PASS: ${{ steps.keyvault.outputs.smtp_pass }}
        EMAIL_FROM: ${{ steps.keyvault.outputs.email_from }}
      with:
        host: ${{ inputs.server }}
        username: ${{ steps.deploy_auth_keyvault.outputs.ssh_username || steps.deploy_auth_secrets.outputs.ssh_username }}
        key: ${{ steps.deploy_auth_keyvault.outputs.ssh_key || steps.deploy_auth_secrets.outputs.ssh_key }}
        fingerprint: ${{ steps.deploy_auth_keyvault.outputs.ssh_fingerprint || steps.deploy_auth_secrets.outputs.ssh_fingerprint }}
        envs: SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS,EMAIL_FROM
        script: |
          set -e
          cd "${{ inputs.deploy-path }}"

          # Keep a non-sensitive local config file available for defaults.
          if [[ -f api.env ]]; then
            cp -f api.env .env
            chmod 600 .env
          fi

          if [[ "${{ inputs.use-azure-keyvault }}" == "true" ]]; then
            required_vars=(SMTP_HOST SMTP_PORT SMTP_SECURE SMTP_USER SMTP_PASS EMAIL_FROM)
            for var_name in "${required_vars[@]}"; do
              if [[ -z "${!var_name:-}" ]]; then
                echo "Missing required API runtime secret: $var_name" >&2
                exit 1
              fi
            done

            export NODE_ENV=production
            export APP_ENABLE_CORS=false
            export EMAIL_PROVIDER=smtp
          else
            export NODE_ENV=production
          fi

          # Install only production dependencies for the standalone API package.
          npm ci --omit=dev

          process_name="$(basename "${{ inputs.deploy-path }}")"

          # Keep the API alive across deployments by restarting when possible.
          if command -v pm2 >/dev/null 2>&1; then
            if pm2 describe "$process_name" >/dev/null 2>&1; then
              pm2 restart "$process_name" --update-env
            else
              pm2 start npm --name "$process_name" -- start
            fi
          else
            # Fallback when PM2 is not available on the target host.
            pkill -f "node server.js" || true
            nohup npm start > api.log 2>&1 < /dev/null &
          fi
