name: Push Code to Server (Reusable)

on:
  workflow_call:
    inputs:
      application:
        required: true
        type: string
        description: 'Application folder name (web, stats, sound, api)'
      deploy-path:
        required: true
        type: string
        description: 'Server deployment path'
      server:
        required: false
        type: string
        default: 'prod.edmundmulligan.name'
        description: 'Server hostname'
      use-azure-keyvault:
        required: false
        type: boolean
        default: false
        description: 'Load deployment credentials and API runtime secrets from Azure Key Vault'
      keyvault-name:
        required: false
        type: string
        default: ''
        description: 'Azure Key Vault name used when use-azure-keyvault=true'
      azure-client-id:
        required: false
        type: string
        default: ''
        description: 'Azure application (client) ID for OIDC login when use-azure-keyvault=true'
      azure-tenant-id:
        required: false
        type: string
        default: ''
        description: 'Azure tenant ID for OIDC login when use-azure-keyvault=true'
      azure-subscription-id:
        required: false
        type: string
        default: ''
        description: 'Azure subscription ID for OIDC login when use-azure-keyvault=true'
    secrets:
      SERVER_USERNAME:
        required: false
      SERVER_SSH_KEY:
        required: false
      SERVER_FINGERPRINT:
        required: false

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest
    # Stabilise GitHub OIDC subject claim for Azure workload identity federation.
    # Required Azure federated credential subject:
    # repo:edmundmulligan/witchcraft-and-wizardy.school:environment:production
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Validate deployment auth configuration
      shell: bash
      env:
        SERVER_USERNAME_INPUT: ${{ secrets.SERVER_USERNAME }}
        SERVER_SSH_KEY_INPUT: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        set -euo pipefail

        if [[ "${{ inputs.use-azure-keyvault }}" == "true" ]]; then
          missing_inputs=()
          if [[ -z "${{ inputs.keyvault-name }}" ]]; then
            missing_inputs+=("keyvault-name")
          fi
          if [[ -z "${{ inputs.azure-client-id }}" ]]; then
            missing_inputs+=("azure-client-id")
          fi
          if [[ -z "${{ inputs.azure-tenant-id }}" ]]; then
            missing_inputs+=("azure-tenant-id")
          fi
          if [[ -z "${{ inputs.azure-subscription-id }}" ]]; then
            missing_inputs+=("azure-subscription-id")
          fi

          if (( ${#missing_inputs[@]} > 0 )); then
            echo "Missing required inputs when use-azure-keyvault=true: ${missing_inputs[*]}" >&2
            exit 1
          fi

          # OIDC federation requires id-token permission in the effective caller chain.
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "OIDC token request metadata is unavailable." >&2
            echo "Ensure caller workflows grant permissions: id-token: write (and contents: read)." >&2
            exit 1
          fi

          echo "Using GitHub Actions environment 'production' for OIDC subject claim." >&2
          echo "Ensure Azure federated credential subject is: repo:${{ github.repository }}:environment:production" >&2
        else
          if [[ -z "$SERVER_USERNAME_INPUT" || -z "$SERVER_SSH_KEY_INPUT" ]]; then
            echo "Missing required GitHub secrets when use-azure-keyvault=false." >&2
            echo "Set SERVER_USERNAME and SERVER_SSH_KEY, or enable use-azure-keyvault=true." >&2
            exit 1
          fi
        fi

    - name: Azure login (OIDC)
      if: inputs.use-azure-keyvault
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Load deployment secrets from Azure Key Vault
      if: inputs.use-azure-keyvault
      id: keyvault
      shell: bash
      env:
        KEYVAULT_NAME: ${{ inputs.keyvault-name }}
      run: |
        set -euo pipefail

        normalize_private_key() {
          local raw="$1"
          local decoded

          # Remove CR characters introduced by copy/paste on Windows systems.
          raw="${raw//$'\r'/}"
          raw="${raw//\\r/}"

          # Unwrap a single pair of wrapping quotes if present.
          if [[ "$raw" =~ ^\".*\"$ ]]; then
            raw="${raw:1:${#raw}-2}"
          elif [[ "$raw" =~ ^\'.*\'$ ]]; then
            raw="${raw:1:${#raw}-2}"
          fi

          # Convert literal "\\n" sequences into real newlines.
          if [[ "$raw" == *"\\n"* ]]; then
            raw="${raw//\\n/$'\n'}"
          fi

          # Accept base64-encoded private keys as input and decode them.
          if [[ "$raw" != *"-----BEGIN "* ]]; then
            decoded="$(printf '%s' "$raw" | base64 --decode 2>/dev/null || true)"
            if [[ "$decoded" == *"-----BEGIN "* && "$decoded" == *"PRIVATE KEY-----"* ]]; then
              raw="$decoded"
            fi
          fi

          printf '%s' "$raw"
        }

        ensure_private_key_shape() {
          local key_value="$1"
          if [[ "$key_value" != *"-----BEGIN "* || "$key_value" != *"PRIVATE KEY-----"* || "$key_value" != *"-----END "* ]]; then
            echo "SERVER-SSH-KEY is not a valid SSH private key payload." >&2
            echo "Store the full private key (including BEGIN/END lines)." >&2
            echo "If stored as one line, use literal \\n sequences; this workflow will normalise them." >&2
            exit 1
          fi
        }

        validate_private_key_parse() {
          local key_name="$1"
          local key_value="$2"
          local tmp_key

          tmp_key="$(mktemp)"
          chmod 600 "$tmp_key"
          printf '%s\n' "$key_value" > "$tmp_key"

          if ! ssh-keygen -yf "$tmp_key" >/dev/null 2>&1; then
            rm -f "$tmp_key"
            echo "$key_name is present but could not be parsed as a valid SSH private key." >&2
            echo "Ensure it is an unencrypted private key in OpenSSH/PEM format." >&2
            exit 1
          fi

          rm -f "$tmp_key"
        }

        add_mask_safe() {
          local value="$1"
          local line
          local escaped_line
          if [[ -z "$value" ]]; then
            return
          fi

          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ -n "$line" ]]; then
              escaped_line="${line//%/%25}"
              escaped_line="${escaped_line//$'\r'/%0D}"
              escaped_line="${escaped_line//$'\n'/%0A}"
              echo "::add-mask::$escaped_line"
            fi
          done <<< "$value"
        }

        if [[ -z "$KEYVAULT_NAME" ]]; then
          echo "keyvault-name is required when use-azure-keyvault=true" >&2
          exit 1
        fi

        get_required_secret() {
          local secret_name="$1"
          local value
          value="$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$secret_name" --query value -o tsv)"
          if [[ -z "$value" ]]; then
            echo "Required secret '$secret_name' is empty in Key Vault '$KEYVAULT_NAME'" >&2
            exit 1
          fi
          printf '%s' "$value"
        }

        get_optional_secret() {
          local secret_name="$1"
          local value
          local rc
          local err_file
          local err_text

          err_file="$(mktemp)"
          if value="$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$secret_name" --query value -o tsv 2>"$err_file")"; then
            rm -f "$err_file"
            printf '%s' "$value"
            return 0
          else
            rc=$?
            err_text="$(cat "$err_file")"
            rm -f "$err_file"

            # Optional secrets should resolve to empty only when the secret does not exist.
            if [[ "$err_text" == *"SecretNotFound"* || "$err_text" == *"not found"* || "$err_text" == *"could not be found"* ]]; then
              return 0
            fi

            echo "Failed to read optional secret '$secret_name' from Key Vault '$KEYVAULT_NAME'." >&2
            if [[ -n "$err_text" ]]; then
              echo "$err_text" >&2
            fi
            exit "$rc"
          fi
        }

        server_username="$(get_required_secret 'SERVER-USERNAME')"
        server_ssh_key_raw="$(get_required_secret 'SERVER-SSH-KEY')"
        if [[ -n "$server_ssh_key_raw" ]]; then
          # Mask the original one-line payload before any newline normalization.
          add_mask_safe "$server_ssh_key_raw"
        fi
        server_ssh_key="$server_ssh_key_raw"
        server_ssh_key="$(normalize_private_key "$server_ssh_key")"
        ensure_private_key_shape "$server_ssh_key"
        validate_private_key_parse "SERVER-SSH-KEY" "$server_ssh_key"
        server_fingerprint="$(get_optional_secret 'SERVER-FINGERPRINT')"

        smtp_host="$(get_required_secret 'SMTP-HOST')"
        smtp_port="$(get_optional_secret 'SMTP-PORT')"
        if [[ -z "$smtp_port" ]]; then
          smtp_port='587'
        fi
        smtp_secure="$(get_optional_secret 'SMTP-SECURE')"
        if [[ -z "$smtp_secure" ]]; then
          smtp_secure='false'
        fi
        smtp_user="$(get_required_secret 'SMTP-USER')"
        smtp_pass="$(get_required_secret 'SMTP-PASS')"
        email_from="$(get_optional_secret 'EMAIL-FROM')"
        if [[ -z "$email_from" ]]; then
          email_from='noreply@embodied-mind.org'
        fi

        if [[ "${{ inputs.application }}" == "api" ]]; then
          db_host="$(get_required_secret 'DB-HOST')"
          db_port="$(get_optional_secret 'DB-PORT')"
          if [[ -z "$db_port" ]]; then
            db_port='3306'
          fi
          db_user="$(get_required_secret 'DB-USER')"
          db_password="$(get_required_secret 'DB-PASSWORD')"
          db_name="$(get_required_secret 'DB-NAME')"
        fi

        for value in \
          "$server_username" "$server_fingerprint" \
          "$smtp_host" "$smtp_user" "$smtp_pass"
        do
          add_mask_safe "$value"
        done
        if [[ "${{ inputs.application }}" == "api" ]]; then
          for value in "$db_host" "$db_user" "$db_password" "$db_name"; do
            add_mask_safe "$value"
          done
        fi
        add_mask_safe "$server_ssh_key"

        output_delim="$(openssl rand -hex 16)"

        {
          echo "server_username<<$output_delim"
          echo "$server_username"
          echo "$output_delim"
          echo "server_ssh_key<<$output_delim"
          echo "$server_ssh_key"
          echo "$output_delim"
          echo "server_fingerprint<<$output_delim"
          echo "$server_fingerprint"
          echo "$output_delim"
          echo "smtp_host<<$output_delim"
          echo "$smtp_host"
          echo "$output_delim"
          echo "smtp_port<<$output_delim"
          echo "$smtp_port"
          echo "$output_delim"
          echo "smtp_secure<<$output_delim"
          echo "$smtp_secure"
          echo "$output_delim"
          echo "smtp_user<<$output_delim"
          echo "$smtp_user"
          echo "$output_delim"
          echo "smtp_pass<<$output_delim"
          echo "$smtp_pass"
          echo "$output_delim"
          echo "email_from<<$output_delim"
          echo "$email_from"
          echo "$output_delim"
          if [[ "${{ inputs.application }}" == "api" ]]; then
            echo "db_host<<$output_delim"
            echo "$db_host"
            echo "$output_delim"
            echo "db_port<<$output_delim"
            echo "$db_port"
            echo "$output_delim"
            echo "db_user<<$output_delim"
            echo "$db_user"
            echo "$output_delim"
            echo "db_password<<$output_delim"
            echo "$db_password"
            echo "$output_delim"
            echo "db_name<<$output_delim"
            echo "$db_name"
            echo "$output_delim"
          fi
        } >> "$GITHUB_OUTPUT"

    - name: Resolve deploy auth from GitHub secrets
      if: ${{ !inputs.use-azure-keyvault }}
      id: deploy_auth_secrets
      shell: bash
      env:
        SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
        SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        SERVER_FINGERPRINT: ${{ secrets.SERVER_FINGERPRINT }}
      run: |
        set -euo pipefail

        normalize_private_key() {
          local raw="$1"
          local decoded

          raw="${raw//$'\r'/}"
          raw="${raw//\\r/}"

          if [[ "$raw" =~ ^\".*\"$ ]]; then
            raw="${raw:1:${#raw}-2}"
          elif [[ "$raw" =~ ^\'.*\'$ ]]; then
            raw="${raw:1:${#raw}-2}"
          fi

          if [[ "$raw" == *"\\n"* ]]; then
            raw="${raw//\\n/$'\n'}"
          fi

          if [[ "$raw" != *"-----BEGIN "* ]]; then
            decoded="$(printf '%s' "$raw" | base64 --decode 2>/dev/null || true)"
            if [[ "$decoded" == *"-----BEGIN "* && "$decoded" == *"PRIVATE KEY-----"* ]]; then
              raw="$decoded"
            fi
          fi

          printf '%s' "$raw"
        }

        ensure_private_key_shape() {
          local key_value="$1"
          if [[ "$key_value" != *"-----BEGIN "* || "$key_value" != *"PRIVATE KEY-----"* || "$key_value" != *"-----END "* ]]; then
            echo "SERVER_SSH_KEY GitHub secret is not a valid SSH private key payload." >&2
            echo "Store the full private key (including BEGIN/END lines)." >&2
            echo "If stored as one line, use literal \\n sequences; this workflow will normalise them." >&2
            exit 1
          fi
        }

        validate_private_key_parse() {
          local key_name="$1"
          local key_value="$2"
          local tmp_key

          tmp_key="$(mktemp)"
          chmod 600 "$tmp_key"
          printf '%s\n' "$key_value" > "$tmp_key"

          if ! ssh-keygen -yf "$tmp_key" >/dev/null 2>&1; then
            rm -f "$tmp_key"
            echo "$key_name is present but could not be parsed as a valid SSH private key." >&2
            echo "Ensure it is an unencrypted private key in OpenSSH/PEM format." >&2
            exit 1
          fi

          rm -f "$tmp_key"
        }

        add_mask_safe() {
          local value="$1"
          local line
          local escaped_line
          if [[ -z "$value" ]]; then
            return
          fi

          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ -n "$line" ]]; then
              escaped_line="${line//%/%25}"
              escaped_line="${escaped_line//$'\r'/%0D}"
              escaped_line="${escaped_line//$'\n'/%0A}"
              echo "::add-mask::$escaped_line"
            fi
          done <<< "$value"
        }

        server_username="$SERVER_USERNAME"
        server_ssh_key_raw="$SERVER_SSH_KEY"
        if [[ -n "$server_ssh_key_raw" ]]; then
          add_mask_safe "$server_ssh_key_raw"
        fi
        server_ssh_key="$server_ssh_key_raw"
        server_ssh_key="$(normalize_private_key "$server_ssh_key")"
        ensure_private_key_shape "$server_ssh_key"
        validate_private_key_parse "SERVER_SSH_KEY" "$server_ssh_key"
        server_fingerprint="$SERVER_FINGERPRINT"

        if [[ -z "$server_username" || -z "$server_ssh_key" ]]; then
          echo "Missing required GitHub secrets for deploy auth when use-azure-keyvault=false." >&2
          echo "Set SERVER_USERNAME and SERVER_SSH_KEY, or enable use-azure-keyvault." >&2
          exit 1
        fi

        add_mask_safe "$server_username"
        add_mask_safe "$server_ssh_key"
        add_mask_safe "$server_fingerprint"

        output_delim="$(openssl rand -hex 16)"
        {
          echo "ssh_username<<$output_delim"
          echo "$server_username"
          echo "$output_delim"
          echo "ssh_key<<$output_delim"
          echo "$server_ssh_key"
          echo "$output_delim"
          echo "ssh_fingerprint<<$output_delim"
          echo "$server_fingerprint"
          echo "$output_delim"
        } >> "$GITHUB_OUTPUT"

    - name: Determine version bump type
      id: bump_type
      run: |
        echo "Event: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "value=patch" >> "$GITHUB_OUTPUT"

    - name: Bump semantic version
      id: version
      shell: bash
      run: |
        set -euo pipefail

        VERSION_FILE="${{ inputs.application }}/VERSION"

        if [ ! -f "$VERSION_FILE" ] || [ ! -s "$VERSION_FILE" ]; then
          echo "VERSION missing or empty; defaulting to 0.0.0"
          echo "0.0.0" > "$VERSION_FILE"
        fi

        new_version="$(bin/bump-version.sh "${{ steps.bump_type.outputs.value }}" "$VERSION_FILE")"
        echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
        echo "New version: ${new_version}"

    - name: Create release tarball
      id: package
      shell: bash
      run: |
        set -euo pipefail

        archive_path="$(bash bin/create-release-tar.sh "${{ steps.version.outputs.new_version }}" "${{ inputs.application }}" releases)"
        archive_name="$(basename "$archive_path")"

        # Count path components so SCP places the file directly under /tmp
        # e.g. stats/releases/archive.tar.gz has 2 leading components to strip
        strip_count="$(echo "$archive_path" | tr -cd '/' | wc -c)"

        echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"
        echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"
        echo "strip_count=$strip_count" >> "$GITHUB_OUTPUT"

    - name: Copy release tarball to server
      uses: appleboy/scp-action@v1.0.0
      with:
        host: ${{ inputs.server }}
        username: ${{ steps.keyvault.outputs.server_username || steps.deploy_auth_secrets.outputs.ssh_username }}
        key: ${{ steps.keyvault.outputs.server_ssh_key || steps.deploy_auth_secrets.outputs.ssh_key }}
        fingerprint: ${{ steps.keyvault.outputs.server_fingerprint || steps.deploy_auth_secrets.outputs.ssh_fingerprint }}
        source: ${{ steps.package.outputs.archive_path }}
        target: /tmp
        strip_components: ${{ steps.package.outputs.strip_count }}

    - name: Extract release tarball on server
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ inputs.server }}
        username: ${{ steps.keyvault.outputs.server_username || steps.deploy_auth_secrets.outputs.ssh_username }}
        key: ${{ steps.keyvault.outputs.server_ssh_key || steps.deploy_auth_secrets.outputs.ssh_key }}
        fingerprint: ${{ steps.keyvault.outputs.server_fingerprint || steps.deploy_auth_secrets.outputs.ssh_fingerprint }}
        script: |
          set -e
          mkdir -p "${{ inputs.deploy-path }}"
          tar -xzf "/tmp/${{ steps.package.outputs.archive_name }}" -C "${{ inputs.deploy-path }}" --strip-components=1
          rm -f "/tmp/${{ steps.package.outputs.archive_name }}"

    - name: Install API dependencies and restart API process
      if: inputs.application == 'api'
      uses: appleboy/ssh-action@v1.2.5
      env:
        SMTP_HOST: ${{ steps.keyvault.outputs.smtp_host }}
        SMTP_PORT: ${{ steps.keyvault.outputs.smtp_port }}
        SMTP_SECURE: ${{ steps.keyvault.outputs.smtp_secure }}
        SMTP_USER: ${{ steps.keyvault.outputs.smtp_user }}
        SMTP_PASS: ${{ steps.keyvault.outputs.smtp_pass }}
        EMAIL_FROM: ${{ steps.keyvault.outputs.email_from }}
        DB_HOST: ${{ steps.keyvault.outputs.db_host }}
        DB_PORT: ${{ steps.keyvault.outputs.db_port }}
        DB_USER: ${{ steps.keyvault.outputs.db_user }}
        DB_PASSWORD: ${{ steps.keyvault.outputs.db_password }}
        DB_NAME: ${{ steps.keyvault.outputs.db_name }}
      with:
        host: ${{ inputs.server }}
        username: ${{ steps.keyvault.outputs.server_username || steps.deploy_auth_secrets.outputs.ssh_username }}
        key: ${{ steps.keyvault.outputs.server_ssh_key || steps.deploy_auth_secrets.outputs.ssh_key }}
        fingerprint: ${{ steps.keyvault.outputs.server_fingerprint || steps.deploy_auth_secrets.outputs.ssh_fingerprint }}
        envs: SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS,EMAIL_FROM,DB_HOST,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME
        script: |
          set -e
          cd "${{ inputs.deploy-path }}"

          # Keep a non-sensitive local config file available for defaults.
          # In non-Key Vault mode, preserve an existing server-managed .env.
          if [[ "${{ inputs.use-azure-keyvault }}" == "true" ]]; then
            if [[ -f api.env ]]; then
              api_env_hash_file=".api-env.sha256"
              api_env_hash="$(sha256sum api.env | awk '{print $1}')"

              should_regenerate_env=false
              if [[ ! -f .env ]]; then
                should_regenerate_env=true
              elif [[ -f "$api_env_hash_file" ]]; then
                previous_api_env_hash="$(cat "$api_env_hash_file" 2>/dev/null || true)"
                if [[ "$api_env_hash" != "$previous_api_env_hash" ]]; then
                  should_regenerate_env=true
                fi
              else
                echo "No api.env hash marker found; preserving existing .env and recording current api.env hash."
              fi

              if [[ "$should_regenerate_env" == "true" ]]; then
                cp -f api.env .env

                # Enforce production-safe defaults in deployed runtime config.
                sed -i '/^NODE_ENV=/d;/^EMAIL_PROVIDER=/d;/^FEEDBACK_STORE_PROVIDER=/d' .env
                {
                  echo 'NODE_ENV=production'
                  echo 'EMAIL_PROVIDER=smtp'
                  echo 'FEEDBACK_STORE_PROVIDER=mariadb'
                } >> .env

                chmod 600 .env
              fi

              printf '%s\n' "$api_env_hash" > "$api_env_hash_file"
              chmod 600 "$api_env_hash_file"
            fi
          else
            if [[ ! -f .env && -f api.env ]]; then
              cp -f api.env .env
              chmod 600 .env
            fi
          fi

          get_env_file_value() {
            local key="$1"
            local env_file=".env"

            if [[ ! -f "$env_file" ]]; then
              return 0
            fi

            awk -F= -v key="$key" '
              /^[[:space:]]*#/ { next }
              index($0, "=") == 0 { next }
              {
                current_key=$1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", current_key)
                if (current_key == key) {
                  value=substr($0, index($0, "=") + 1)
                  sub(/\r$/, "", value)
                  print value
                }
              }
            ' "$env_file" | tail -n 1
          }

          if [[ "${{ inputs.use-azure-keyvault }}" == "true" ]]; then
            required_vars=(SMTP_HOST SMTP_USER SMTP_PASS DB_HOST DB_USER DB_PASSWORD DB_NAME)
            for var_name in "${required_vars[@]}"; do
              if [[ ! "$var_name" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
                echo "Invalid environment variable name while checking required API runtime secret: $var_name" >&2
                exit 1
              fi

              # Shell-native dynamic lookup (works in bash/zsh) without external printenv dependency.
              eval "var_value=\${$var_name-}"
              if [[ -z "$var_value" ]]; then
                echo "Missing required API runtime secret: $var_name" >&2
                exit 1
              fi
            done

            export NODE_ENV=production
            export APP_ENABLE_CORS=false
            export EMAIL_PROVIDER=smtp
            export FEEDBACK_STORE_PROVIDER=mariadb
            export DB_HOST="$DB_HOST"
            export DB_PORT="${DB_PORT:-3306}"
            export DB_USER="$DB_USER"
            export DB_PASSWORD="$DB_PASSWORD"
            export DB_NAME="$DB_NAME"
          else
            smtp_host_effective="${SMTP_HOST:-$(get_env_file_value SMTP_HOST)}"
            smtp_port_effective="${SMTP_PORT:-$(get_env_file_value SMTP_PORT)}"
            smtp_secure_effective="${SMTP_SECURE:-$(get_env_file_value SMTP_SECURE)}"
            smtp_user_effective="${SMTP_USER:-$(get_env_file_value SMTP_USER)}"
            smtp_pass_effective="${SMTP_PASS:-$(get_env_file_value SMTP_PASS)}"
            email_from_effective="${EMAIL_FROM:-$(get_env_file_value EMAIL_FROM)}"
            db_host_effective="${DB_HOST:-$(get_env_file_value DB_HOST)}"
            db_port_effective="${DB_PORT:-$(get_env_file_value DB_PORT)}"
            db_user_effective="${DB_USER:-$(get_env_file_value DB_USER)}"
            db_password_effective="${DB_PASSWORD:-$(get_env_file_value DB_PASSWORD)}"
            db_name_effective="${DB_NAME:-$(get_env_file_value DB_NAME)}"

            if [[ -z "$smtp_port_effective" ]]; then
              smtp_port_effective='587'
            fi
            if [[ -z "$smtp_secure_effective" ]]; then
              smtp_secure_effective='false'
            fi
            if [[ -z "$email_from_effective" ]]; then
              email_from_effective='noreply@embodied-mind.org'
            fi
            if [[ -z "$db_port_effective" ]]; then
              db_port_effective='3306'
            fi

            if [[ -z "$smtp_host_effective" || -z "$smtp_user_effective" || -z "$smtp_pass_effective" ]]; then
              echo "Missing SMTP configuration for non-Key Vault deploy." >&2
              echo "Set SMTP_HOST/SMTP_USER/SMTP_PASS in the server environment or managed .env file." >&2
              exit 1
            fi

            export NODE_ENV=production
            export SMTP_HOST="$smtp_host_effective"
            export SMTP_PORT="$smtp_port_effective"
            export SMTP_SECURE="$smtp_secure_effective"
            export SMTP_USER="$smtp_user_effective"
            export SMTP_PASS="$smtp_pass_effective"
            export EMAIL_FROM="$email_from_effective"

            # Only enable MariaDB feedback store if all DB credentials are present
            if [[ -n "$db_host_effective" && -n "$db_user_effective" && -n "$db_password_effective" && -n "$db_name_effective" ]]; then
              export FEEDBACK_STORE_PROVIDER=mariadb
              export DB_HOST="$db_host_effective"
              export DB_PORT="$db_port_effective"
              export DB_USER="$db_user_effective"
              export DB_PASSWORD="$db_password_effective"
              export DB_NAME="$db_name_effective"
            else
              export FEEDBACK_STORE_PROVIDER=none
              echo "[WARN] MariaDB feedback store not enabled: missing DB credentials (DB_HOST, DB_USER, DB_PASSWORD, DB_NAME)" >&2
            fi
          fi

          # Install only production dependencies for the standalone API package.
          npm ci --omit=dev

          process_name="$(basename "${{ inputs.deploy-path }}")"

          # Keep the API alive across deployments by restarting when possible.
          if command -v pm2 >/dev/null 2>&1; then
            if pm2 describe "$process_name" >/dev/null 2>&1; then
              pm2 restart "$process_name" --update-env
            else
              pm2 start npm --name "$process_name" -- start
            fi

            # Persist process changes so pm2 resurrect restores on reboot.
            pm2 save
          else
            # Fallback when PM2 is not available on the target host.
            pkill -f "node server.js" || true
            nohup npm start > api.log 2>&1 < /dev/null &
          fi
