<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Start of meta tags -->
    <meta charset="UTF-8">
    <meta name="description" content="Web Witchcraft and Wizardry">
    <meta name="keywords" content="HTML, CSS, learning">
    <meta name="author" content="Edmund Mulligan">
    <meta name="license" content="MIT License">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- End of meta tags -->

    <!-- Set the document title-->
    <title>Web Witchcraft and Wizardry</title>

    <!-- Link to Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/icons/favicon.svg">

    <!--Links for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Marcellus&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- End Google Fonts links -->

    <!-- Link to Font Awesome Icons (using CSS rather than JS)-->
    <link rel="stylesheet" href="https://kit.fontawesome.com/3895b3f1a4.css" crossorigin="anonymous">
    <!-- End Font Awesome Icons -->

    <!-- stylesheets -->
    <link rel="stylesheet" href="styles/globals.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/pages/index.css">

    <!-- Load JavaScript files -->
    <script src="scripts/utils.js" defer></script>
    <script src="scripts/queryParams.js" defer></script>
    <script src="scripts/debug.js" defer></script>
    <script src="scripts/themeSwitcher.js" defer></script>
    <script src="scripts/toggleHeaderAndFooter.js" defer></script>
    <script src="scripts/injectCommonCode.js" type="module"></script>
    <script src="scripts/embodiedMindPopover.js" defer></script>
    <script src="scripts/toggleSection.js" defer></script>
    <script src="scripts/animatePortraits.js" defer></script>
    <script src="scripts/toggleAnimation.js" defer></script>

    <!-- End JavaScript file link -->

    <!-- Handle no JavaScript scenario -->
    <noscript>
      <link rel="stylesheet" href="styles/utilities/noscript.css">
    </noscript>
  </head>

  <body>
    <header class="header">
      <!-- Header content is injected by JavaScript to ensure it is the same across all pages -->
    </header>

    <main class="main">
      <section class="index-block" id="index-block-1">
        <h2 class="page-title">Choose your theme and style</h2>
        <div class="circular-button-container">
          <a href="#" class="button-circle" id="light-button">Light</a>
          <a href="#" class="button-circle" id="dark-button">Dark</a>
        </div>
        <div class="circular-button-container">
          <a href="#" class="button-circle-small" id="normal-button">Normal</a>
          <a href="#" class="button-circle-small" id="subdued-button">Subdued</a>
          <a href="#" class="button-circle-small" id="vibrant-button">Vibrant</a>
        </div>
        <button type="button" id="animations-button" class="button-rectangle">
          <!-- Button Text is injected by Javascript-->
          .
        </button>
      </section>

      <section class="index-block" id="index-block-2">
        <h2 class="page-title">Click on your chosen path</h2>
        <div class="circular-button-container path-buttons">
          <a href="pages/start.html" class="button-circle" id="start-button">Start</a>
          <a href="pages/students.html" class="button-circle" id="students-button">I am a Student</a>
          <a href="pages/mentors.html" class="button-circle" id="mentors-button">I am a Mentor</a>
        </div>
      </section>

      <section class="portrait-block" id="portrait-block-1">
        <!-- Portrait content is injected by JavaScript -->
      </section>

      <section class="portrait-block" id="portrait-block-2">
        <!-- Portrait content is injected by JavaScript -->
      </section>
    </main>

    <footer class="footer">
      <!-- Footer content is injected by JavaScript to ensure it is the same across all pages -->
    </footer>
  </body>
</html>
