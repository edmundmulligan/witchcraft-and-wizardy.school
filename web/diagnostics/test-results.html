<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Test Results Dashboard - Web Witchcraft and Wizardry">
    <meta name="keywords" content="testing, accessibility, validation, dashboard">
    <meta name="author" content="Edmund Mulligan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Test Results Dashboard - Web Witchcraft and Wizardry</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/icons/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto+Slab:wght@400;700&family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../styles/globals.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/diagnostics/test-results.css">

    <!-- JavaScript -->
    <script src="../scripts/utils.js" defer></script>
    <script src="../scripts/queryParams.js" defer></script>
    <script src="../scripts/debug.js" defer></script>
    <script src="../scripts/diagnostics/displayTestResults.js" defer></script>

</head>
<body>
    <header>
        <h1><i class="fas fa-chart-line"></i> Web Witchcraft and Wizardry Test Results Dashboard</h1>
        <nav aria-label="breadcrumb">
            <a href="../index.html">Home</a> &gt;
            <a href="index.html">Diagnostics</a> &gt;
            <a href="test-results.html" aria-current="page">Test Results</a>
        </nav>
    </header>

    <main>
        <div class="dashboard-header">
            <div class="dashboard-title">Automated Test Suite Results</div>
            <button type="button" class="refresh-btn" onclick="loadAllResults()">
                <i class="fas fa-sync-alt"></i> Refresh Results
            </button>
        </div>

        <div id="summary-bar" class="summary-bar">
            <div class="summary-card info">
                <div class="summary-value" id="total-tests">-</div>
                <div class="summary-label">Total Tests</div>
            </div>
            <div class="summary-card success">
                <div class="summary-value" id="passed-tests">-</div>
                <div class="summary-label">Passed</div>
            </div>
            <div class="summary-card error">
                <div class="summary-value" id="failed-tests">-</div>
                <div class="summary-label">Failed</div>
            </div>
            <div class="summary-card warning">
                <div class="summary-value" id="warnings">-</div>
                <div class="summary-label">Warnings</div>
            </div>
        </div>

        <div id="test-results" class="test-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading test results...</div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </main>

    <!-- Modal for displaying detailed errors/warnings -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Test Details</h2>
                <button type="button" class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>
</body>
</html>
