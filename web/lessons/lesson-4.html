<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage with Images</title>
  </head>
  <body>
    <header>
      <h1>Witches and Wizards</h1>
    </header>
    <main>
      <section>
        <h2>A witch and Wizard</h2>
        <img src="rachel-mulligan-witch-old-female.png" width="200" alt="An old female witch">
        <img src="rachel-mulligan-wizard-old-male.png" width="200" alt="An old male wizard">
      </section>
      <section>
        <h2>A cat and raven familiar</h2>
        <img src="cat-duotone-light-full.svg" width="100" alt="A cat familiar">
        <img src="crow-duotone-solid-full.svg" width="100" alt="A raven familiar">
      </section>
      <section>
        <h2>Photos of a cat and raven familiar</h2>
        <figure>
          <img src="cat-familiar.jpg" width="400" alt="A photo of a cat familiar">
          <figcaption>A photo of a cat familiar called Tiddles, Lord of Darkness</figcaption>
        </figure>

        <figure>
          <img src="raven-familiar.jpg" width="400" alt="A photo of a raven familiar">
          <figcaption>A photo of a raven familiar called Quoth, Keeper of Secrets</figcaption>
        </figure>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 The Witches and Wizards Collective</p>
    </footer>
  </body>
</html>
